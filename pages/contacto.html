<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta  name="viewport" content="width=device-width initial scale=1.0">
        <title>Contacto</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="../css/styles.css">
    </head>
    <body>
        <header class="header">
            <div class="header__caja">
               <img src="../imagenes/logo.png"
               alt="Imagen del logo son tres puntas de fecha posiconadas en forma horizontal de color naranja" 
               class="header__logo"
               width="150">
               <h1 class="header__titulo"> Descubriendo lugares de Argentina</h1>
            </div>
        </header>
        <nav class="nav">
             <ul class="nav__list">
                <li class="nav__item">
                    <a href="../index.html" class="nav__link">Inicio</a>
                </li>
                <li class="nav__item">
                    <a href="../lugares.html" class="nav__link">Lugares</a>
                </li>
                <li class="nav__item">
                    <a href="contacto.html" class="nav__link">Contactos</a>
                </li>
                <li class="nav__item">
                    <a href="../resenias.html" class="nav__link">Reseñas</a>
                </li>
            </ul>
        </nav>
        <main class="main">
            <div class="contacto__caja">
                <section id="contacto" class="contacto__seccion">
                    <h2 class="contacto__titulo">Contacto</h2>
                    <form action="https://formspree.io/f/xwvykjel" method="POST" class="contacto__formulario">
                        <label for="nombre" class="contacto__label">Nombre</label>
                        <input type="text" id="nombre" name="nombre" class="contacto__input">
                        <label for="email" class="contacto__label">Correo electrónico</label>
                        <input type="email" id="email" name="email" class="contacto__input">
                        <label for="mensaje" class="contacto__label">Mensaje</label>
                        <textarea  id="mensaje"  name="mensaje" rows="4" cols="50" class="contacto__textarea" required></textarea>
                        <button type="submit" class="contacto__boton">Enviar</button>
                        <input type="hidden" name="_next" value="gracias.html">
                    </form>
                </section>
            </div>
        </main>
        <footer class="footer">
            <div class="footer__caja">
                <div class="footer__texto-bloque">
                    <p class="footer__texto">
                        © 2026 Descubriendo lugares de Argentina
                    </p>
                </div>
                <div class="footer__redes">
                    <a href="#" class="footer__link-red">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" class="footer__link-red">
                        <i class="fa-brands fa-facebook"></i>
                    </a>
                    <a href="#" class="footer__link-red">
                        <i class="fa-brands fa-twitter"></i>
                    </a>
                </div>
            </div>    
        </footer>
    </body>
    
</html>
